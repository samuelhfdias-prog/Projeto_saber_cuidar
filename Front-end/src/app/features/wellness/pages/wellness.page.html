<app-page-shell theme="wellbeing" title="Bem-estar do Cuidador" subtitle="Cuidar de voce e tao importante quanto cuidar de quem voce ama" icon="BE">
  <section class="checkin-intro">
    <h2>Check-in diario</h2>
    <p>Leva menos de 1 minuto. Responda com sinceridade.</p>
  </section>

  <section class="checkin-grid">
    <section class="checkin-block" *ngFor="let q of checkinGroups; trackBy: trackByQuestionId">
      <h3 style="margin-bottom: 12px; font-size: 16px;">
        {{ q.question }} <span *ngIf="q.required" style="color: #e53935;">*</span>
      </h3>

      <div [ngSwitch]="q.type">
        <div *ngSwitchCase="'humor'" class="checkin-options">
          <button type="button" class="option-card" [class.selected]="answers[q.id] === 'feliz'" (click)="setAnswer(q.id, 'feliz')">
            <span>😊</span> Bem
          </button>
          <button type="button" class="option-card" [class.selected]="answers[q.id] === 'neutro'" (click)="setAnswer(q.id, 'neutro')">
            <span>😐</span> Razoável
          </button>
          <button type="button" class="option-card" [class.selected]="answers[q.id] === 'triste'" (click)="setAnswer(q.id, 'triste')">
            <span>😔</span> Mal
          </button>
        </div>

        <div *ngSwitchCase="'boolean'" class="checkin-options" style="display: flex; gap: 12px;">
          <button type="button" class="option-card" style="flex: 1; justify-content: center;" [class.selected]="answers[q.id] === 'sim'" (click)="setAnswer(q.id, 'sim')">Sim</button>
          <button type="button" class="option-card" style="flex: 1; justify-content: center;" [class.selected]="answers[q.id] === 'nao'" (click)="setAnswer(q.id, 'nao')">Não</button>
        </div>

        <div *ngSwitchCase="'text'">
          <textarea [ngModel]="answers[q.id]" (ngModelChange)="setAnswer(q.id, $event)" placeholder="Descreva aqui..." rows="3" style="width: 100%; border-radius: 12px; border: 1px solid var(--border-color, #e0e0e0); padding: 12px; background: var(--surface); color: var(--text-primary); font-family: inherit; resize: vertical;"></textarea>
        </div>
      </div>
    </section>
  </section>

  <app-state
    *ngIf="feedback"
    [type]="feedback.type"
    [title]="feedback.title"
    [message]="feedback.message"
  ></app-state>

  <button
    type="button"
    class="checkin-submit"
    [class.ready]="canConfirmCheckin"
    [disabled]="!canConfirmCheckin"
    (click)="confirmCheckIn()"
  >
    <span>✓</span>
    Confirmar Check-in
  </button>


</app-page-shell>
