<section class="guide-warning-card" aria-label="Cuidados importantes">
  <div class="guide-section-title">
    <span aria-hidden="true">!</span>
    <div>
      <h2>{{ title }}</h2>
      <p>{{ description }}</p>
    </div>
  </div>

  <ul>
    <li *ngFor="let item of items; trackBy: trackByText">{{ item }}</li>
  </ul>
</section>
